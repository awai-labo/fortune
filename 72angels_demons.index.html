<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>72天使 × 72悪魔 対応表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --gold:#C9A84C;
  --gold-light:#E8CC7A;
  --gold-dim:#7A6230;
  --ink:#1A1410;
  --ink2:#2D2419;
  --parchment:#F5EFE0;
  --parchment2:#EDE3CE;
  --shadow-angel:#3C2A6B;
  --shadow-demon:#6B1A1A;
  --muted:#7A6E5A;
  --border:#C9A84C44;
  --angel-bg:#EEF0FA;
  --angel-text:#2A1F5E;
  --demon-bg:#FAEEEE;
  --demon-text:#5E1F1F;
  --fire-bg:#FAECE7;--fire-text:#712B13;
  --earth-bg:#EAF3DE;--earth-text:#27500A;
  --air-bg:#E6F1FB;--air-text:#0C447C;
  --water-bg:#EEEDFE;--water-text:#3C3489;
}

body{
  background: var(--parchment);
  background-image:
    radial-gradient(ellipse at 20% 20%, #E8D9B522 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, #D4C4A822 0%, transparent 60%);
  font-family:'Noto Serif JP', serif;
  color:var(--ink);
  min-height:100vh;
}

header{
  text-align:center;
  padding: 2.5rem 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #1A1410 0%, #2D2419 100%);
  position:relative;
  overflow:hidden;
}
header::before{
  content:'✦';
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:280px;
  color:#ffffff06;
  pointer-events:none;
}
header h1{
  font-family:'Cinzel',serif;
  font-size:clamp(1.1rem,3vw,1.8rem);
  color:var(--gold);
  letter-spacing:.2em;
  font-weight:600;
}
header p{
  font-size:11px;
  color:#9A8A6A;
  margin-top:.5rem;
  letter-spacing:.15em;
}

.controls{
  display:flex;gap:10px;flex-wrap:wrap;
  padding:1rem 1rem .5rem;
  align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--parchment2);
}
.controls label{font-size:12px;color:var(--muted);}
select,input[type=text]{
  font-size:12px;padding:5px 9px;
  border-radius:4px;
  border:1px solid var(--gold-dim);
  background:var(--parchment);
  color:var(--ink);
  font-family:'Noto Serif JP',serif;
}
input[type=text]{width:160px;}

.legend{
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding:.5rem 1rem;
  background:var(--parchment2);
  border-bottom:1px solid var(--border);
  font-size:11px;
}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-dot{width:10px;height:10px;border-radius:50%;}
.leg-angel{background:var(--shadow-angel);opacity:.7;}
.leg-demon{background:var(--shadow-demon);opacity:.7;}

.table-wrap{overflow-x:auto;padding:.5rem 0;}

table{
  width:100%;border-collapse:collapse;
  font-size:11.5px;
}
th{
  font-family:'Cinzel',serif;
  font-size:10px;font-weight:600;
  color:var(--gold-dim);
  text-align:left;
  padding:7px 8px;
  border-bottom:1px solid var(--gold-dim);
  white-space:nowrap;
  background:var(--ink2);
  letter-spacing:.08em;
}
th.angel-head{color:#9A9FD4;}
th.demon-head{color:#D49A9A;}

td{
  padding:6px 8px;
  border-bottom:.5px solid #D4C4A855;
  vertical-align:top;
  color:var(--ink);
  line-height:1.5;
}
tr:hover td{background:#EDE3CE88;}

/* 区切り列 */
td.divider,th.divider{
  width:4px;padding:0;
  background:linear-gradient(180deg,var(--gold-dim),var(--gold));
  opacity:.4;
}

.num{
  font-family:'Cinzel',serif;
  color:var(--gold-dim);font-size:10px;
  text-align:center;
}

/* ヘブライ */
.heb{direction:rtl;font-size:15px;font-weight:500;}
.heb-kana{direction:ltr;display:block;font-size:9px;color:var(--muted);text-align:center;line-height:1.4;}

/* 天使エリア */
td.angel-area{background:#F5F3FF44;}
.angel-name-en{font-weight:500;font-size:12px;color:var(--angel-text);}
.angel-name-jp{font-size:10px;color:#6A5FAA;}
.angel-domain{font-size:10px;color:var(--muted);}

/* 悪魔エリア */
td.demon-area{background:#FFF3F344;}
.demon-name-en{font-weight:500;font-size:12px;color:var(--demon-text);}
.demon-name-jp{font-size:10px;color:#AA5F5F;}
.demon-rank{
  display:inline-block;font-size:9px;
  padding:1px 5px;border-radius:3px;
  background:#F0D4D4;color:#8B2020;
  margin-bottom:2px;
}
.demon-domain{font-size:10px;color:var(--muted);}

/* タロットバッジ */
.card-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;font-weight:500;}
.fire{background:var(--fire-bg);color:var(--fire-text);}
.earth{background:var(--earth-bg);color:var(--earth-text);}
.air{background:var(--air-bg);color:var(--air-text);}
.water{background:var(--water-bg);color:var(--water-text);}
.sign-text{font-size:10px;color:var(--muted);display:block;margin-top:2px;}
.planet-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:#EDE3CE;color:var(--muted);}

/* ミラー感 - 天使と悪魔の間の記号 */
.mirror{text-align:center;font-size:14px;color:var(--gold-dim);padding:0 4px !important;}
</style>
</head>

<tbody id="tbody"></tbody>
</table>
</div>

const mapByN={};
map.forEach(m=>mapByN[m.n]=m);
const demonByN={};
demons.forEach(d=>demonByN[d[0]]=d);

function render(){
  const sv=document.getElementById('suitFilter').value;
  const rv=document.getElementById('rankFilter').value;
  const kw=document.getElementById('search').value.toLowerCase();
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';

  angels.forEach(([num,heb,yomi,yomiKana,angelEn,angelJp,angelDomain])=>{
    const m=mapByN[num];
    const d=demonByN[num];
    if(!m||!d)return;
    if(sv&&m.suit!==sv)return;
    if(rv&&d[3]!==rv)return;
    const searchStr=`${num}${yomi}${yomiKana}${angelEn}${angelJp}${angelDomain}${d[1]}${d[2]}${d[3]}${d[4]}${m.suit}${m.card}${m.planet}${m.sign}`.toLowerCase();
    if(kw&&!searchStr.includes(kw))return;

    const sc=suitClass[m.suit]||'';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="num angel-area">${num}</td>
      <td class="angel-area">
        <span class="heb">${heb}</span>
        <span class="heb-kana">${hebToKana(heb)}</span>
      </td>
      <td class="angel-area">
        <span style="font-size:11px;font-weight:600;">${yomi}</span><br>
        <span style="font-size:9px;color:var(--muted);">${yomiKana}</span>
      </td>
      <td class="angel-area">
        <span class="angel-name-en">${angelEn}</span><br>
        <span class="angel-name-jp">${angelJp}</span>
      </td>
      <td class="divider"></td>
      <td>
        <span class="card-badge ${sc}">${m.suit}${m.card}</span>
        <span class="sign-text">${m.sign}</span>
      </td>
      <td><span class="planet-badge">${m.planet}</span></td>
      <td class="divider"></td>
      <td class="demon-area"><span class="demon-rank">${d[3]}</span></td>
      <td class="demon-area">
        <span class="demon-name-en">${d[1]}</span><br>
        <span class="demon-name-jp">${d[2]}</span>
      </td>
      <td class="demon-area">
        <span class="angel-domain" style="color:#7A6A8A;">天：${angelDomain}</span><br>
        <span class="demon-domain">魔：${d[4]}</span>
      </td>
    `;
    tbody.appendChild(tr);
  });
});
}

render();
document.getElementById('suitFilter').addEventListener('change',render);
