<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Integration Tree — Oracle</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2308080f'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%23c9a84c' stroke-width='4'/%3E%3Cpath d='M32 12v40M18 32h28M23 20l18 24M41 20 23 44' stroke='%23c9a84c' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.35);
      --bg: #08080f;
      --text: #e8e0d0;
      --text-dim: rgba(232,224,208,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(60,80,160,0.08) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 520px; }

    header { text-align: center; margin-bottom: 2.5rem; }

    .site-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(10px, 2.5vw, 13px);
      letter-spacing: 0.3em;
      color: var(--gold);
      opacity: 0.85;
      text-transform: uppercase;
    }

    .site-sub {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .lang-switch {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.6rem;
    }

    .lang-btn {
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Cinzel Decorative', serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 6px 18px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
      opacity: 0.45;
    }

    .lang-btn.active {
      opacity: 1;
      border-color: var(--gold);
    }

    .q-area { margin-bottom: 1.4rem; }

    .q-area textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      line-height: 1.65;
      transition: border-color 0.3s;
    }

    .q-area textarea::placeholder { color: var(--text-dim); font-style: italic; }
    .q-area textarea:focus { border-color: rgba(201,168,76,0.65); }

    .draw-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.45);
      color: var(--gold);
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      padding: 13px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
      margin-bottom: 2rem;
    }

    .draw-btn:hover { background: rgba(201,168,76,0.07); border-color: var(--gold); }
    .draw-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .card-stage { display: none; }
    .card-stage.visible { display: block; animation: fadeUp 0.8s ease forwards; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.6rem; }

    .card-face {
      width: 200px;
      height: 320px;
      border-radius: 11px;
      border: 1px solid rgba(201,168,76,0.38);
      overflow: hidden;
      box-shadow: 0 0 36px rgba(201,168,76,0.13), 0 20px 56px rgba(0,0,0,0.72);
      transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    .card-face.reversed { transform: rotate(180deg); }
    .card-face svg { width: 100%; height: 100%; display: block; }

    .card-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--gold);
      margin-top: 12px;
    }

    .card-orient {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 4px;
    }

    .reading-box {
      background: rgba(255,255,255,0.025);
      border: 0.5px solid rgba(201,168,76,0.18);
      border-radius: 9px;
      padding: 1.6rem 1.5rem;
      position: relative;
    }

    .reading-box::before {
      content: '✦';
      position: absolute;
      top: -11px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      padding: 0 10px;
      color: var(--gold);
      font-size: 14px;
    }

    .reading-loading {
      text-align: center;
      font-style: italic;
      color: var(--text-dim);
      font-size: 15px;
      padding: 1rem 0;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    .reading-text {
      font-size: 17px;
      line-height: 1.95;
      font-weight: 300;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* ── Instagram link ── */
    .instagram-link {
      text-align: center;
      margin-top: 1.6rem;
    }

    .instagram-link a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.08em;
      transition: color 0.3s;
    }

    .instagram-link a:hover { color: var(--gold); }
    .instagram-link svg { flex-shrink: 0; }
  </style>
  <meta property="og:title" content="The Integration Tree — Oracle" />
<meta property="og:description" content="カバラの生命の樹と北欧神話ユグドラシルを統合したオラクル" />
<meta property="og:url" content="https://fortune-five-psi.vercel.app/oracle/" />
<meta property="og:image" content="https://raw.githubusercontent.com/awai-labo/fortune/main/oracle/images/ogp.png" />
<meta property="og:type" content="website" />
</head>
<body>
  <div class="wrap">
    <header>
      <p class="site-title">The Integration Tree</p>
      <p class="site-sub">Oracle — Kabbalistic &amp; Norse</p>
    </header>

    <div class="lang-switch">
      <button class="lang-btn active" id="btnJa" onclick="setLang('ja')">JP</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
    </div>

    <div class="q-area">
      <textarea id="userQ" rows="2" placeholder="今、問いかけたいことを書いてください（省略可）…"></textarea>
    </div>

    <button class="draw-btn" id="drawBtn" onclick="drawCard()">✦ Draw a Card ✦</button>

    <div class="card-stage" id="cardStage">
      <div class="card-wrap">
        <div class="card-face" id="cardFace">
          <svg id="cardSvg" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <p class="card-name" id="cardName"></p>
        <p class="card-orient" id="cardOrient"></p>
      </div>

      <div class="reading-box">
        <div class="reading-loading" id="readingLoading">鑑定文を受信中…</div>
        <div class="reading-text" id="readingText" style="display:none;"></div>
      </div>

      <div class="instagram-link">
        <a href="https://www.instagram.com/awaikeiko" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
          @awaikeiko
        </a>
      </div>
    </div>
  </div>

  <script src="cards-data.js"></script>
  <script>
    const API_ENDPOINT = 'https://fortune-five-psi.vercel.app/api/oracle';
    let currentLang = 'ja';
    let currentDrawId = 0;
    let typingTimer = null;

    function stopTyping() {
      if (typingTimer) {
        clearInterval(typingTimer);
        typingTimer = null;
      }
    }

    function setLang(lang) {
      currentLang = lang;
      document.getElementById('btnJa').className = 'lang-btn' + (lang === 'ja' ? ' active' : '');
      document.getElementById('btnEn').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
      document.getElementById('userQ').placeholder = lang === 'ja'
        ? '今、問いかけたいことを書いてください（省略可）…'
        : 'Write your question here (optional)…';
      document.getElementById('drawBtn').textContent = lang === 'ja'
        ? '✦ Draw a Card ✦'
        : '✦ Draw a Card ✦';
    }

    function buildSvg(card) {
      if (card.image) {
        return `<image href="${card.image}" width="200" height="320" preserveAspectRatio="xMidYMid slice"/>`;
      }
      const [c1, c2] = card.gradStops;
      const gid = 'g' + card.id;
      return `
        <defs>
          <radialGradient id="${gid}" cx="50%" cy="60%" r="75%">
            <stop offset="0%" stop-color="${c2[1]}"/>
            <stop offset="45%" stop-color="${c1[1]}"/>
            <stop offset="100%" stop-color="${c1[0]}"/>
          </radialGradient>
        </defs>
        <rect width="200" height="320" fill="url(#${gid})"/>
        <text x="100" y="138" text-anchor="middle" dominant-baseline="middle"
          font-size="60" fill="${card.symbolColor}" opacity="0.88">${card.symbol}</text>
        <line x1="70" y1="162" x2="130" y2="162" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
        <text x="100" y="182" text-anchor="middle"
          font-family="'Cinzel Decorative',serif" font-size="8.5" letter-spacing="3"
          fill="rgba(255,255,255,0.72)">${card.name}</text>
        <text x="100" y="208" text-anchor="middle"
          font-family="'Cormorant Garamond',serif" font-size="10" font-style="italic"
          fill="rgba(255,255,255,0.52)">${card.subs[0]}</text>
        <text x="100" y="223" text-anchor="middle"
          font-family="'Cormorant Garamond',serif" font-size="10" font-style="italic"
          fill="rgba(255,255,255,0.52)">${card.subs[1]}</text>
      `;
    }

    async function drawCard() {
      const drawId = ++currentDrawId;
      stopTyping();

      const btn = document.getElementById('drawBtn');
      btn.disabled = true;
      btn.textContent = '…';

      const card = CARDS[Math.floor(Math.random() * CARDS.length)];
      const isReversed = Math.random() > 0.65;
      const question = document.getElementById('userQ').value.trim();

      document.getElementById('cardSvg').innerHTML = buildSvg(card);
      const face = document.getElementById('cardFace');
      face.className = 'card-face' + (isReversed ? ' reversed' : '');
      document.getElementById('cardName').textContent = card.name + ' · ' + card.type.toUpperCase();
      document.getElementById('cardOrient').textContent = isReversed
        ? (currentLang === 'ja' ? '↓ Reversed' : '↓ Reversed')
        : (currentLang === 'ja' ? '↑ Upright' : '↑ Upright');

      const stage = document.getElementById('cardStage');
      stage.className = 'card-stage visible';

      const loadingEl = document.getElementById('readingLoading');
      loadingEl.textContent = currentLang === 'ja' ? '鑑定文を受信中…' : 'Reading the cards…';
      loadingEl.style.display = 'block';
      document.getElementById('readingText').style.display = 'none';
      document.getElementById('readingText').textContent = '';

      try {
        const resp = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            card: {
              name: card.name,
              type: card.type,
              keywords: card.keywords,
              upright: card.upright,
              reversed: card.reversed,
            },
            orientation: isReversed ? 'reversed' : 'upright',
            question,
            lang: currentLang,
          }),
        });

        const data = await resp.json();
        if (drawId !== currentDrawId) return;

        const text = data.reading || (currentLang === 'ja' ? '（読み取れませんでした）' : '(Could not retrieve reading)');

        loadingEl.style.display = 'none';
        const rt = document.getElementById('readingText');
        rt.style.display = 'block';

        let i = 0;
        typingTimer = setInterval(() => {
          if (drawId !== currentDrawId) {
            stopTyping();
            return;
          }

          rt.textContent = text.slice(0, i);
          i += 2;
          if (i > text.length) {
            rt.textContent = text;
            stopTyping();
            btn.disabled = false;
            btn.textContent = '✦ Draw a Card ✦';
          }
        }, 18);

      } catch (e) {
        if (drawId !== currentDrawId) return;

        loadingEl.style.display = 'none';
        const rt = document.getElementById('readingText');
        rt.style.display = 'block';
        rt.textContent = currentLang === 'ja' ? 'エラー：' + e.message : 'Error: ' + e.message;
        btn.disabled = false;
        btn.textContent = '✦ Draw a Card ✦';
      }
    }
  </script>
</body>
</html>
