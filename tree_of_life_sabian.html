<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自分の資質を感じるための生命の樹占星術</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080818;color:#e8d5a3;
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  min-height:100vh;overflow-x:hidden;
}
canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:30px 20px}
h1{font-size:2rem;letter-spacing:.3em;color:#ffd700;text-shadow:0 0 30px #ffd70066;margin-bottom:6px;font-weight:normal}
.subtitle{font-size:.85rem;letter-spacing:.2em;color:#c8a86888;margin-bottom:30px}
.form-card{
  background:rgba(10,6,30,.75);border:1px solid #ffd70033;border-radius:16px;
  padding:28px 36px;max-width:600px;width:100%;
  backdrop-filter:blur(12px);box-shadow:0 0 40px #7c5cbf22;margin-bottom:36px;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-full{grid-column:1/-1}
label{display:block;font-size:.8rem;letter-spacing:.15em;color:#c8a068;margin-bottom:6px}
input{
  width:100%;background:rgba(255,255,255,.04);border:1px solid #ffd70033;border-radius:8px;
  padding:10px 14px;color:#f0e0b0;font-size:.95rem;font-family:inherit;outline:none;transition:border .2s;
}
input:focus{border-color:#ffd70088;box-shadow:0 0 12px #ffd70022}
input::placeholder{color:#7a6040}
.btn{
  width:100%;margin-top:20px;padding:14px;
  background:linear-gradient(135deg,#7c4a9a,#3a2060);
  border:1px solid #ffd70055;border-radius:10px;
  color:#ffd700;font-size:1rem;letter-spacing:.2em;
  cursor:pointer;font-family:inherit;transition:all .3s;
}
.btn:hover{background:linear-gradient(135deg,#9a60b8,#4e2e80);box-shadow:0 0 20px #ffd70033}
.btn:disabled{opacity:.5;cursor:not-allowed}
.main-content{
  display:grid;grid-template-columns:1fr 360px;gap:30px;
  max-width:1100px;width:100%;align-items:start;
}
@media(max-width:900px){.main-content{grid-template-columns:1fr}}
.tree-wrap{
  background:rgba(10,6,30,.6);border:1px solid #ffd70022;border-radius:16px;padding:16px;
  backdrop-filter:blur(8px);position:sticky;top:20px;
}
.tree-title{text-align:center;font-size:.75rem;letter-spacing:.2em;color:#c8a06888;margin-bottom:8px}
svg#tree{width:100%;height:auto;display:block}
.results-wrap{display:flex;flex-direction:column;gap:14px}
.planet-card{
  background:rgba(10,6,30,.75);border:1px solid #ffd70022;border-radius:12px;
  padding:16px 18px;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);
}
.planet-card:hover,.planet-card.active{
  border-color:#ffd70066;box-shadow:0 0 20px #7c5cbf33;
  background:rgba(20,10,50,.85);
}
.planet-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.planet-icon{font-size:1.5rem}
.planet-name{font-size:1rem;letter-spacing:.1em;color:#ffd700;font-weight:bold}
.planet-sub{font-size:.78rem;color:#9a8060;letter-spacing:.05em}
.zodiac-info{font-size:1.1rem;letter-spacing:.05em;color:#f0d880;margin-bottom:6px}
.sabian-symbol{font-size:.88rem;color:#d4b870;letter-spacing:.05em;margin-bottom:4px;padding-left:10px;border-left:2px solid #ffd70044}
.sabian-desc{font-size:.8rem;color:#b0a090;line-height:1.8;display:none;padding-top:10px;border-top:1px solid #ffd70022;margin-top:8px}
.planet-card.active .sabian-desc{display:block}
.error{color:#f08060;text-align:center;padding:10px;font-size:.9rem}
.loading{color:#ffd70088;text-align:center;padding:12px;letter-spacing:.15em;font-size:.9rem;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.birth-info{font-size:.78rem;color:#9a8060;letter-spacing:.08em;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #ffd70022}
.daath-note{font-size:.72rem;color:#7a6888;text-align:center;letter-spacing:.1em;margin-top:4px}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="app">
  <h1>✦ 自分の資質を感じるための生命の樹占星術 ✦</h1>
  <div class="subtitle">Tree of Life × Sabian Oracle × Kabbalah</div>
  <div class="form-card">
    <div class="form-grid">
      <div>
        <label>生年月日</label>
        <input type="date" id="bdate">
      </div>
      <div>
        <label>出生時刻</label>
        <input type="time" id="btime" value="12:00">
      </div>
      <div class="form-full">
        <label>出生地（例：Tokyo, Japan / 大阪市）</label>
        <input type="text" id="bloc" placeholder="都市名を入力">
      </div>
    </div>
    <button class="btn" id="calcBtn" onclick="calculate()">✦ 星を読む ✦</button>
    <div id="msg"></div>
  </div>
  <div class="main-content" id="mainContent" style="display:none">
    <div class="results-wrap" id="resultCards"></div>
    <div class="tree-wrap">
      <div class="tree-title">✦ 生命の樹 ✦</div>
      <svg id="tree" viewBox="0 0 340 560" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="daath-note">破線 = ダアト（隠された知）</div>
    </div>
  </div>
</div>

<script>
// ── STARS ──
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:250},()=>({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.3+.2,a:Math.random()*.7+.15,
    sp:Math.random()*.008+.002
  }));
  let t=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);t+=.01;
    stars.forEach(s=>{
      ctx.beginPath();
      ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,240,200,${s.a*(0.65+0.35*Math.sin(t*s.sp*100))})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script>

const SABIAN = {"1": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 1, "symbol": "水から上がった女性と彼女を抱きしめるアザラシ", "description": "全星座のゼロ地点。魂がまだ羊水の記憶をまとったまま、はじめての陸に足をつける瞬間。\n「やってみる」という衝動が最も純粋な形で宿っている。\n光は、無垢な直観と無限の可能性。影は、海（無意識）に戻りたがる引力との葛藤。\nまだ目醒めていないからこそ、この人がいる場所には、何かが「始まる予感」が漂う。"}, "2": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 2, "symbol": "人間の自然な本質を明らかにするコメディアン", "description": "真似ることで本質を掴む、天然の観察者。\n意図せず笑いを生み出すのは、偏見のないまなざしが本質を映し出してしまうから。\n光は、先入観のなさと直観的な洞察力。影は、自分の軸がないまま周囲に染まりすぎること。\n笑いの奥に、するどい真実が宿っている。"}, "3": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 3, "symbol": "祖国の特色から作られた男の横顔のカメオ", "description": "その人を見れば、その人が育った土壌がわかる。\n所属する場所や人間関係の色がそのままアイデンティティになりやすい度数。\n光は、どこにでも自然になじむ柔軟さ。影は、流されすぎて「自分」を見失うこと。\n「どこにいるか」が「どんな人か」を形づくる。"}, "4": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 4, "symbol": "人里から離れた道を散策するふたりの恋人たち", "description": "ふたつの極が出会うことで、自分の輪郭がはじめて見える。\n誰かを必要とすることで、自分の中の「男」と「女」が静かに目醒める度数。\n光は、対比によって深まる自己理解と内なる創造力。影は、秘密主義と孤立の傾向。\n心を許した相手にだけ、すべてを見せることができる。"}, "5": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 5, "symbol": "羽のついた三角", "description": "形になる前から、すでに飛んでいる理想がある。\n地に足がつかないほど高い志を持ち、現実の基準では計れない場所をめざす。\n光は、純粋な精神性と際限のない創造的ひらめき。影は、抽象に留まって形にできないもどかしさ。\nこの人がいる場所には、見えない翼の気配がある。"}, "6": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 6, "symbol": "一辺が明るく照らされている四角", "description": "自分の中の土台を、意志の力だけで完成させようとする。\nまだ揺れているからこそ、頑なさで自分を支えなければならない段階。\n光は、一途さと情熱的な集中力。影は、他者の声を遮断する頑固さ。\n光に照らされた一辺の向こうに、まだ見ぬ自分の基盤が待っている。"}, "7": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 7, "symbol": "ふたつの領域で同時に自己表現するのに成功する男", "description": "相反するものを同時に体現することで、自分が立体になっていく。\n矛盾に見えるものを抱えることが、かえってこの人の個性を深くする。\n光は、二元性を理解する洞察力と多面的な自己表現。影は、どちらでもあることの不安定さ。\n対立を選ばず、両方を生きることを選んだ人。"}, "8": {"sign_ja": "牡羊座", "sign_en": "Aries", "degree": 8, "symbol": "東から吹く風になびくリボンのついた大きな女性の帽子", "description": "まだ誰も気づいていない「始まりの予兆」をいち早くキャッチする感性。\n風が運んでくる情報を、帽子のリボンのように敏感に受け取る。\n光は、時代の始まりを感じ取る鋭いアンテナ。影は、情報の識別力が育つ前の混乱と振り回され。\nあらゆる風を感じるからこそ、守られていることも必要な段階。"}, "9": {"sign_ja": "牡羊座", "sign_en": "Aries", "d en": "Leo", "degree": 25, "symbol": "広大で険しい砂漠を横切っている大きなラクダ", "description": "外に依存せず、必要なものを全て内側に持って進む。\nカバラの「砂漠のラクダ」の道—自分の足だけで渡れる者だけが通れる。\n光は、自立した精神力と過酷な道を越える忍耐力。影は、孤独な道で孤立すること。\nラクダのコブは、砂漠を越えた後も消えない。"}, "146": {"sign_ja": "獅子座", "sign_en": "Leo", "degree": 26, "symbol": "激しい嵐のあとの虹", "description": "様々な試練を超えた後、神との約束のような何かが見える。\n純粋に信じ、尽くし続けた人にだけ、奇跡が現れる。\n光は、霊的な力による突破と、使命にたどり着く喜び。影は、試練の長さに耐えきれないこと。\n虹は雨が止まなければ現れない。"}, "147": {"sign_ja": "獅子座", "sign_en": "Leo", "degree": 27, "symbol": "東の空の夜明けの光", "description": "自分にしかできない生き方を、世界に向けて宣言する夜明け。\n再スタートの光は、東の空から静かに、しかし確実にやってくる。\n光は、唯一無二の個性が世界へと放たれる瞬間の輝き。影は、まだ誰も見ていない道への恐れ。\n夜明けは、昨日が本当に終わったことを教えてくれる。"}, "148": {"sign_ja": "獅子座", "sign_en": "Leo", "degree": 28, "symbol": "大きな木の枝先に乗り出すたくさんの小鳥たち", "description": "大きな人生の木の、細かな日常の枝に宿る小さな喜び。\n非日常だけでなく、日常の中にも自分らしさを刻む。\n光は、日常を豊かに生きる細やかな創意工夫。影は、小さなことに気を取られて大きな流れを見失うこと。\n枝の先に鳥が集まるのは、そこが一番眺めがいいから。"}, "149": {"sign_ja": "獅子座", "sign_en": "Leo", "degree": 29, "symbol": "人間の姿に生まれ変わる準備のできた人魚", "description": "潜在的なひらめきが、いよいよ現実の形になろうとしている。\n海と陸のはざまで、次の自分が誕生しようとする瞬間。\n光は、想像を現実に変える創作意欲と、変容への準備。影は、まだ半分水の中にいることの不完全さ。\n人魚姫は、陸を夢見ながら、まず波間から顔を出した。"}, "150": {"sign_ja": "獅子座", "sign_en": "Leo", "degree": 30, "symbol": "開封された手紙", "description": "内側で育てたものが、手を離れて公共の宝になる。\n主観から生まれたものが、多くの人に開かれていく。\n光は、寛大さとオープンさ、自分のものを惜しみなく分かち合う力。影は、プライベートが消えることへの寂しさ。\n封を開けることで、手紙はやっと届いたことになる。"}, "151": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 1, "symbol": "特徴が芸術的に強調されている男の頭", "description": "細部を見ることで、全体の本質が浮かび上がる。\n誰もが見過ごすディテールに、この人の眼は向いている。\n光は、鋭い観察眼と微調整の精度。影は、細部にこだわりすぎて全体を見失うこと。\nピカソが描く顔は、現実より真実に近い。"}, "152": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 2, "symbol": "景観を見下ろす大きな白い十字架", "description": "主観を手放したとき、世界が広く見渡せるようになる。\n自分の感情より、物事があるがままに見えることを選ぶ。\n光は、客観的な視野と自己を律する潔さ。影は、主観を押し殺すことで生きる実感が薄れること。\n高い場所から見るとき、山の高さは相対的になる。"}, "153": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 3, "symbol": "ふたりの守護天使", "description": "外の型に従うことで、内の不安が落ち着く。\nガイドに従うことは弱さではなく、成長の賢い方法。\n光は、外の基準を通して自己を安定させる実用的な知性。影は、型への依存が深まること。\n守護天使は、方向を示すが、歩くのは自分。"}, "154": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 4, "symbol": "一緒に楽しく遊ぶ白人と黒人の子どもたち", "description": "信念を持つことで、見た目の違いを超えてつながれる。\n不平等に気づいた眼が、修正のための力になる。\n光は、信念に基づく公平さと、本質でつながる力。影は、理想主義が現実の複雑さを見えなくすること。\n子どもは肌の色より、遊びの楽しさを先に見る。"}, "155": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 5, "symbol": "霊の代理人に気づくようになった男", "description": "目に見えないものの仕組みを理解することで、見え方が変わる。\n名前を変えるだけで、人の反応は驚くほど変わる。\n光は、本質を別の角度から見直す知性と、言語の持つ力への理解。影は、表面を変えるだけで本質を変えないこと。\n精霊に気づくとき、世界は新しい言語を語り始める。"}, "156": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 6, "symbol": "メリーゴーラウンド", "description": "限られた環境の中で、自在にイメージを動かす。\nルールの中でこそ、創造的な対応力が鍛えられる。\n光は、状況への応答力と、限定の中で発揮される創意工夫。影は、同じ場所を回り続けることへの飽き。\nメリーゴーラウンドは同じ場所を回っていても、景色は変わって見える。"}, "157": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 7, "symbol": "ハーレム", "description": "多様な要求に応えることで、自分の振れ幅が広がる。\n外からの求めが、能力を引き出す動力になる。\n光は、他者のニーズへの高い応答力と、対人関係で磨かれる資質。影は、他者の期待に振り回されて自分を失うこと。\n複数の鏡に囲まれると、自分の全方向が見える。"}, "158": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 8, "symbol": "5歳の子どもの初めてのダンスレッスン", "description": "仕組みを理解した後、身体でそれを体得していく。\n知るだけでなく、体に染み込ませることで本物になる。\n光は、理解と実践の統合と、情感を身体で表現する感性。影は、完璧に覚えようとして自由な動きを失うこと。\n5歳の子どものダンスは、失敗を恐れないから美しい。"}, "159": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 9, "symbol": "表現主義の画家の描く絵", "description": "感情を客観的に扱い、他には真似できない表現を生み出す。\n主観を材料にして、世界に一つだけの作品を作る。\n光は、独自の感性と、感情を芸術に変換する創造力。影は、個性が際立ちすぎて孤立すること。\n表現主義の絵は、見る人の感情を揺さぶるために、感情で描かれている。"}, "160": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 10, "symbol": "影の向こうを見て、影を超えていくふたつの頭", "description": "突き詰めた先で、自分の影に出会う。\n完璧を目指すほど、影が濃くなっていく。\n光は、限界を超えようとする意志と、影を直視する勇気。影は、こだわりが執着となって統合を阻むこと。\n影は、光が強いほど、くっきりと現れる。"}, "161": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 11, "symbol": "母親とそれに応じる息子", "description": "芽生えた希望を、絶対に実現させようとする強い意志。\n「こうしたい」という小さな火を、大切に守り育てる。\n光は、強い完成意志と、目標に向けた純粋な集中力。影は、完璧主義が自分や他者への厳しさになること。\n母親の期待と子の応答は、愛情の言語。"}, "162": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 12, "symbol": "結婚式のあとで花嫁のヴェールをはずす花婿", "description": "生命のサイクルを読み解き、管理する知性。\n神秘を分析することで、自然の法則を使いこなす。\n光は、自然のリズムを理解する知性と、生命の謎への探究心。影は、分析しすぎて神秘そのものを失うこと。\nヴェールが取れた後、見えてくるものがある。"}, "163": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 13, "symbol": "制圧する力のある政治家", "description": "混乱の中で、冷静に問題の本質を見抜いて解決する。\nパニックに動じない知性が、状況を制圧する。\n光は、問題解決能力と、正しさを貫く押しの強さ。影は、力が強すぎて反感を買うこと。\n制圧とは、力ではなく、より深い理解から生まれる。"}, "164": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 14, "symbol": "貴族の家系図", "description": "受け継いだ価値を守り、さらに磨いて次へと渡す。\n個人の力の限界を超えるために、継承という形を選ぶ。\n光は、価値の保存と継承の力、ブランドとしての信頼。影は、家系図に縛られて新しい可能性を閉じること。\n家系図は、未来の自分への手紙でもある。"}, "165": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 15, "symbol": "家宝の上等なレースのハンカチーフ", "description": "受け継いだものをどう使うか、それが今の自分の問い。\n過去の勇敢さが今の自分の誇りとなっている。\n光は、来歴への誇りと、受け継いだ力の丁寧な運用。影は、家宝に頼りすぎて自分の力を磨かないこと。\nハンカチは使われてこそ、その意味を持つ。"}, "166": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 16, "symbol": "動物園でオランウータンと直面する子どもたち", "description": "完璧に整えた秩序が、野性と出会ったとき崩れる。\n抑えてきた本能が、思わぬ形で戻ってくる。\n光は、本来の自分を取り戻す転換点と、自己認識の深まり。影は、ショックに対処できず混乱すること。\nオランウータンは鏡の中の自分かもしれない。"}, "167": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 17, "symbol": "噴火している火山", "description": "抑えに抑えてきたものが、ついに地表を突き破る。\n噴火は破壊であると同時に、土地を豊かにする営みでもある。\n光は、感情の解放と、それによって自分に還ること。影は、爆発が制御不能になること。\n火山は噴火することで、新しい大地を作る。"}, "168": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 18, "symbol": "ウィジャ盤", "description": "理性では予測できないものを、あえて招き入れる。\n偶然性を利用することで、知性の限界を超える。\n光は、見えない世界の情報を意識的に受け取る柔軟さ。影は、わからないものへの恐れが増すこと。\nウィジャ盤は、答えを知っているのではなく、問いを深める道具。"}, "169": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 19, "symbol": "水泳競争", "description": "感情の世界に飛び込み、自由に泳ぐことを覚える。\n深層心理という海を、自在に渡れるようになる。\n光は、無意識の領域を積極的に活用する力。影は、感情の海に溺れること。\n競泳は、水への恐れを超えた人だけが参加できる。"}, "170": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 20, "symbol": "西海岸をめざしているキャラバン車", "description": "今の環境を超えた先に、未知の可能性が待っている。\n仲間と共に、新しい刺激の中に飛び込んでいく。\n光は、可能性への勇気と、多様な環境から学ぶ適応力。影は、新しさを求めすぎて根を張れないこと。\n旅は目的地のためではなく、途中で変わるために始まる。"}, "171": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 21, "symbol": "女子バスケットボールチーム", "description": "高い目標に向かって、チームで力を合わせる。\n個人の能力がチームの文脈で発揮されるとき、最大になる。\n光は、高い集中力とチームへの貢献力。影は、勝利へのプレッシャーが純粋さを失わせること。\nゴールは高くても、チームがあれば届く。"}, "172": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 22, "symbol": "宝石のついた王家の紋章", "description": "磨き抜いた能力が、最高の評価として認められる瞬間。\n努力は見えないところで積み重ねられ、結果として現れる。\n光は、卓越した実績と、それを支えた積み重ねへの誇り。影は、評価に依存して磨き続けることをやめること。\n紋章は、その家の歴史の重さを一つの形にしたもの。"}, "173": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 23, "symbol": "技能と個性を披露するライオンの調教師", "description": "本能を否定するのではなく、受け容れて洗練させる。\n自分の中の野性と向き合うことで、それが強みになる。\n光は、本能を教育する力と、他者の資質を引き出す洞察。影は、本能を否定しすぎて活力が失われること。\nライオンは調教されても、その眼の奥に野性を持っている。"}, "174": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 24, "symbol": "メリーと彼女の白い羊", "description": "自分の中にあるものを、批判せずにそのまま受け取る。\n他者への優しさは、まず自分への優しさから始まる。\n光は、素直な受容力と、世界をそのまま愛する柔軟さ。影は、批判力を手放してだまされやすくなること。\nメリーさんの羊は、愛されているから離れない。"}, "175": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 25, "symbol": "公共の建物の前の半旗", "description": "やりきったことを、きっちりと締めくくる。\nけじめをつけることで、次の始まりが生まれる。\n光は、物事を完全に閉じる誠実さと、けじめをつける力。影は、終わらせることへの執着と名残惜しさ。\n旗を降ろすことは、次に旗を掲げるための準備。"}, "176": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 26, "symbol": "祭壇のそばの聖職者に吊り香炉を捧げる少年", "description": "限定された役割をまっとうしながら、全体性への扉が見えてくる。\n導かれることで、自分では届かない境地に近づく。\n光は、師から学ぶ謙虚さと、より大きな世界への開放性。影は、役割に縛られて自主性を失うこと。\n香炉の煙は、目に見えない場所へと届いていく。"}, "177": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 27, "symbol": "宮廷の行事で儀式的に顔を合わせる貴婦人たち", "description": "余裕のある立場から、精神的な充足を広めていく。\n目の前の利益より、精神的な豊かさを大切にする生き方。\n光は、精神的な充足への関心と、それを伝え広める力。影は、現実から離れた貴族趣味への批判。\n宮廷の茶話会は、世界を静かに変えることもある。"}, "178": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 28, "symbol": "権力を握ったはげ頭の男", "description": "隠すものがなくなったとき、すべてが直接伝わる。\n情報を受け取り、見極め、隠さず伝える透明さ。\n光は、直観的な把握力と、情報を余すところなく伝える誠実さ。影は、繊細さが欠けて無神経になること。\nはげた頭に、宇宙の情報が直接降りてくる。"}, "179": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 29, "symbol": "オカルト知識の探求者", "description": "表面的な世界の奥に隠された、変わらない真実を求める。\n普遍的な核心に近づくために、古代の叡智を紐解く。\n光は、本質への深い探究心と、霊的な知への渇望。影は、難解な知識に没入して現実から離れること。\nオカルトとは「隠されたもの」—だからこそ、求める。"}, "180": {"sign_ja": "乙女座", "sign_en": "Virgo", "degree": 30, "symbol": "いかなる誘惑も無視する男性", "description": "自分の世界を完成させるために、誘惑を遮断する。\n集中こそが、完全への道。\n光は、高い集中力と、目標に向けた妥協のない精神。影は、閉じすぎて成長の機会を逃すこと。\n次の天秤座では、その扉を開くことになる。"}, "181": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 1, "symbol": "完璧な美しい羽を見せている蝶", "description": "磨き上げた自分を、世界に対して開いていく。\n他者の目に映る自分が、次の自分を作っていく。\n光は、自己開示と、それによって生まれる相互理解。影は、他者の視線に囚われて真の自分を見失うこと。\n針に刺されたからこそ、この羽は永遠に美しい。"}, "182": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 2, "symbol": "過去の経験の実り", "description": "これまで積み上げたすべてが、他者との出会いで新しい形になる。\n自分の種が、他者という土地で開花していく。\n光は、蓄積が他者との交流で多彩に実る豊かさ。影は、与えることばかりで消耗すること。\n種は土に落ちるまで、自分が何になるか知らない。"}, "183": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 3, "symbol": "明らかにする新しい日の夜明け", "description": "他者からの反響が、自分の立ち位置を変えていく。\n自分が何かを発すると、世界が応えて、次の自分が現れる。\n光は、相互作用の中で生まれる変化と成長。影は、他者の反応に振り回されること。\n夜明けは、自分でなく宇宙が決める。"}, "184": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 4, "symbol": "霊的なコミュニケーションをとる若者たち", "description": "内側にあるものをさらけ出すと、磁石のように仲間が集まってくる。\n共鳴した者たちが火を囲む、不思議な縁がある。\n光は、魂レベルでのつながりと、共鳴から生まれる深い絆。影は、閉じたコミュニティが外を排除すること。\n炎を囲む者は、火が燃える前から仲間だった。"}, "185": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 5, "symbol": "内なる知識を明らかにする男", "description": "求められることに応えるうちに、自分の内側が見えてくる。\n教えることは、実は自分が最も学ぶ行為。\n光は、他者との対話から深まる自己理解。影は、自分の答えを持たないまま語ること。\n光を分け与えるほど、光は増える。"}, "186": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 6, "symbol": "理想が具現化するのを見ている男", "description": "内側で描いたビジョンが、外の世界に現れていく。\n意志を発するほど、世界がそれに応えてくる。\n光は、内と外が呼応する豊かな創造力。影は、思い通りにならない現実への失望。\n見ている間に、理想はもう動き始めている。"}, "187": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 7, "symbol": "鷹から守っている女性", "description": "手に入れたものを守ろうとすると、外への開放性が失われる。\n内を守ることと、外に開くことのバランスが問われる。\n光は、自分の世界を大切にしながら広げていく知性。影は、守ることに執着して新しい可能性を閉じること。\n鷹を追い払うと、大空への窓も閉まる。"}, "188": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 8, "symbol": "さびれた家の中で燃え盛っている暖炉", "description": "人と関わることをあきらめかけたとき、内なる火が復活への力になる。\nどんなに外が寂れても、内側の炎だけは消えない。\n光は、逆境の中でも燃え続ける内なる意志。影は、閉じこもることで孤立が深まること。\n廃墟の中の暖炉は、まだ人の帰りを待っている。"}, "189": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 9, "symbol": "特別室の壁にかかっている三人の巨匠", "description": "多様な巨人たちから学ぶことで、自分の可能性が広がる。\n比較することで、自分がどこにいるかわかる。\n光は、他者から学ぶ謙虚さと、多様な視点から磨かれる人格。影は、比べることへの劣等感や嫉妬。\n巨匠たちも、かつては誰かを見上げていた。"}, "190": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 10, "symbol": "静かな水域に達したカヌー", "description": "揉まれた後に、ようやく落ち着いて全体が見渡せる。\n激流を超えた経験が、冷静さという財産になる。\n光は、対人関係の経験から生まれる成熟と落ち着き。影は、平穏に慣れて成長が止まること。\n嵐を越えたカヌーは、波に乗る術を知っている。"}, "191": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 11, "symbol": "生徒たちを眼鏡ごしに見つめている教授", "description": "知ったことを広めることで、世の中をより良くしたい。\n教えることへの使命感が、この人を動かしている。\n光は、伝道の情熱と、個々の理解に寄り添う洞察力。影は、教えることが支配になること。\n眼鏡を通して見る眼は、それがなくても世界の姿を知っている。"}, "192": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 12, "symbol": "山から出てくる炭坑夫", "description": "未知の領域に潜り込み、真実の鉱脈を掘り当てる。\n危険を顧みない探究心が、誰も見ていない場所を照らす。\n光は、徹底した集中力と、未知への挑戦する勇気。影は、掘り続けることの孤独と消耗。\n坑道を進むほど、外の光は見えなくなる。でも、その先に鉱脈がある。"}, "193": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 13, "symbol": "しゃぼん玉をふくらませている子どもたち", "description": "次々とアイデアが浮かんでは消え、また新しいものが生まれる。\n深刻に一つを追うより、軽やかに多くを試す。\n光は、多彩な発想力とブレインストーミングの喜び。影は、消えることへの虚しさとアイデアが形にならないこと。\nシャボン玉は消えるから、もっと吹きたくなる。"}, "194": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 14, "symbol": "暑い正午の時間に昼寝する男", "description": "考えることをやめたとき、無意識から答えが浮かび上がる。\nあえて手放すことで、つかめるものがある。\n光は、無意識の力を積極的に活用する知恵。影は、怠けることを正当化すること。\n昼寝は休息ではなく、別の次元での作業時間。"}, "195": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 15, "symbol": "環状の道", "description": "同じことを繰り返しながら、少しずつ螺旋状に上がっていく。\n反復こそが、理解を根付かせる。\n光は、コツコツとした学びの積み重ねと、深まる理解の喜び。影は、同じ場所を回り続けているような焦燥感。\n環状の道は、どこで止まっても「途中」にある。"}, "196": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 16, "symbol": "立てかけられているボート", "description": "嵐で傷ついたとき、修繕の時間が次の航海を可能にする。\n関係性の困難が、新しいやり方を見つけるきっかけになる。\n光は、挫折から学ぶ力と、再出発への意欲。影は、傷ついたまま動けなくなること。\n立てかけたボートは、修繕の後、もっと遠くへ行ける。"}, "197": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 17, "symbol": "湾で出入りしている船を眺める引退した船長", "description": "距離を置いて眺めることで、見えてくるものがある。\n傷ついた後、一歩引くことで冷静さが戻ってくる。\n光は、経験からくる観察眼と、新しいアプローチを見出す柔軟さ。影は、引いたまま戻ることができなくなること。\n引退した船長は、海を最もよく知っている。"}, "198": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 18, "symbol": "逮捕されたふたりの男", "description": "主流からはずれた声に、あえて耳を傾ける。\n少数派の存在を認めることで、全体がより豊かになる。\n光は、多様性への公平な眼と、弱者への共感力。影は、少数派への共感が多数派との摩擦を生むこと。\n逮捕された者が、いつか時代を変えることもある。"}, "199": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 19, "symbol": "隠れている泥棒集団", "description": "まだ世に出ていない価値を、いち早く見つけ出す。\n主流ではないものの中にこそ、次の時代の種がある。\n光は、潜在的な価値を嗅ぎ取る感性と、アンダーグラウンドへの理解。影は、主流から外れることへのリスク。\n泥棒集団は、いつか美術館になるものを盗んでいる。"}, "200": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 20, "symbol": "任務を遂行しているラビ", "description": "どんな状況でも、信念を静かに貫き続ける。\n周囲がどうであれ、自分の意志を持ち続ける。\n光は、信念の強さと、状況に左右されない精神的な自立。影は、頑固さが他者との関係を硬化させること。\nラビは迫害の中でも、戒律の言葉を忘れなかった。"}, "201": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 21, "symbol": "日曜日のビーチを楽しむ群衆", "description": "誰が来ても受け入れる、大きなビーチのような包容力。\nどんな人にも偏見を持たず、公平に向き合える。\n光は、広い受容力と、多様な人々と自然につながる力。影は、広く薄くなって深いつながりを作れないこと。\nビーチは誰も選ばないから、みんなが集まる。"}, "202": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 22, "symbol": "噴水で鳥に水をやっている子ども", "description": "純粋な優しさで、必要としている者に寄り添う。\n何も求めず、ただそこにいることで癒しになる。\n光は、無欲の思いやりと、人の心を潤す温かさ。影は、人に頼られすぎて自分が枯渇すること。\n噴水は、流れ続けることで、やっと役に立つ。"}, "203": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 23, "symbol": "夜明けを告げるおんどりの声", "description": "まだ闇の中にいる人々に、夜明けの到来を知らせる。\n変化の予兆をいち早く察して、言葉にする役割がある。\n光は、時代の転換点を感知する鋭さと、伝達する使命感。影は、先を行きすぎてまわりとの距離が生まれること。\nおんどりの声は、太陽より先に届く。"}, "204": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 24, "symbol": "左側に三枚目の羽を持つ蝶", "description": "言葉にならない気配や真実を、第三の感覚で受け取る。\n表面と本質のズレを、繊細な感性が捉える。\n光は、本質を察する霊的な感受性と、状況の真実を読む力。影は、感じすぎることへの疲弊。\n三枚目の羽は、他の二枚が見ていない角度を見ている。"}, "205": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 25, "symbol": "唐突に啓示する秋の葉の光景", "description": "日常の風景の中に、突然、宇宙の真理が見える。\n目を向けることで、すべてが生と死のサイクルを教えてくれる。\n光は、日常の中に宇宙の法則を読み取る直観。影は、深い気づきに圧倒されて立ちすくむこと。\n紅葉は毎年来るが、気づく者の目には毎回新しい。"}, "206": {"sign_ja": "天秤座", "sign_en": "Libra", "degree": 26, "symbol": "お互いに入れ替わる鷹と大きな白い鳩", "description": "鋭さと柔らかさを状況に応じて使い 岩場の海岸", "description": "深く共感できると思っていた相手の中に、溶けない壁を見つける。\n本当に分かり合えない何かを知ることが、理解の深まりになる。\n光は、人の本質への洞察と、不可能を受け入れる成熟。影は、失望が深い傷になること。\n波は砕けても、岩場は岩場のまま。"}, "216": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 6, "symbol": "ゴールドラッシュ", "description": "すべてを捨てて、まだ見ぬ可能性の中に飛び込む。\n過去との完全な断絶が、新しい深い自己を呼び覚ます。\n光は、全身全霊での挑戦と、変容を生む覚悟の強さ。影は、なにかを残したままでは、新しい可能性が開かれないこと。\n砂金を掘り当てる前に、まず故郷を去らなければならない。"}, "217": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 7, "symbol": "深海潜水夫", "description": "強烈なプレッシャーの中でも、真実を掴んで戻ってくる。\n深く潜るほど、自分の心の深層が見えてくる。\n光は、圧力の中で発揮される精神力と、深層心理への洞察。影は、深海の孤独と、地上への道を見失うこと。\n深海には、陸上では存在できないものが生きている。"}, "218": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 8, "symbol": "静かな湖面に映る月明かり", "description": "心が静まったとき、無意識に宿っている真実が映し出される。\n湖に映る月は、本物より揺れることがある。\n光は、自己の深層を直視する勇気と、内なる統合への道。影は、見たくないものを見てしまう怖さ。\n湖の月は、空を見なくてもそこにある。"}, "219": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 9, "symbol": "仕事中の歯医者", "description": "どんなに動かしがたい現実でも、変えようとする力がある。\n本気で向き合えば、不可逆と思えたものが変わる。\n光は、強い意志と、限界に挑戦する集中力。影は、無理をすることで生じる副作用。\n虫歯は自然には治らない。でも、歯医者の前では話が違う。"}, "220": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 10, "symbol": "古い仲間を再び結びつける親睦夕食会", "description": "心の深みで約束していたような仲間と、再びめぐり会う。\n食事を共にすることで、言葉より深い理解が生まれる。\n光は、魂レベルでつながる絆と、再会がもたらす深い充実感。影は、理想化された関係への幻想。\n夕食の席で、心はいつも少し開く。"}, "221": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 11, "symbol": "救助されている溺れた男性", "description": "すべてを手放したとき、初めて助けの手が届く。\n完全に委ねることで、自分一人では得られなかった何かが入ってくる。\n光は、手放す勇気と、他者に飛び込むことで生まれる新しい可能性。影は、溺れても助けを求められないこと。\n救われる者は、まず沈まなければならない。"}, "222": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 12, "symbol": "大使館の公式舞踏会", "description": "本心を隠しながら、最適なタイミングで深くつながる術。\n社交の表面の下で、静かに相手を見定めている。\n光は、戦略的な関係構築力と、深くつながるための知恵。影は、本心を出せない孤立感。\n舞踏会では、誰もが仮面をつけたまま踊っている。"}, "223": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 13, "symbol": "実験室で実験をする発明家", "description": "人と人の組み合わせを操ることで、新しい何かが生まれる。\n欠落を埋め合うパズルを意図的に作り出す。\n光は、人を見る眼と、最適な組み合わせを生み出す仲介力。影は、操っているように見られること。\n発明家は、予測できない反応が起こるとき最も興奮する。"}, "224": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 14, "symbol": "新しい回線をつなげている電話接続士", "description": "その人の最善を引き出してくれる相手と、つないでいく。\n適切なつながりが、人の可能性を開く。\n光は、人を見抜く洞察力と、最高の人脈を引き寄せる力。影は、つなぎ役に徹しすぎて自分の欲求を忘れること。\n新しい回線がつながる音が、何かの始まりを知らせる。"}, "225": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 15, "symbol": "五つの砂山のまわりで遊んでいる子供たち", "description": "人間の五感と五体をすべて活かして、みんなで何かを作る。\n集まった多様な力が、一つでは生まれなかったものを生む。\n光は、集団の創造力と、遊びの中から生まれる本物の喜び。影は、仕切り役が生む摩擦と混乱。\n砂山は積み上げるより、壊す方が一瞬のことが多い。"}, "226": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 16, "symbol": "突然笑い出した少女の顔", "description": "自分にくつろいでいるとき、その人の磁力は最大になる。\n力まないことが、最も力のある引き寄せ方。\n光は、自然体の魅力と、存在そのものが持つ引き寄せの力。影は、努力することの大切さを忘れること。\n少女が笑うとき、理由を必要としない。"}, "227": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 17, "symbol": "偉大な子どもを多く産み出した女性", "description": "外ではなく内側に目を向けたとき、まだ知らない自分が産まれる。\n自己生殖とも言える内なる発掘が始まる。\n光は、自分の内側から未知の可能性を引き出す創造力。影は、内向きすぎて外の世界との接点を失うこと。\n偉大なものは、外からやってくるのではなく、内から生まれる。"}, "228": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 18, "symbol": "多彩に素晴らしく輝く森の中の道", "description": "新しい挑戦が、内側の使われていない部分を開花させる。\n目標を持つことが、変容の引き金になる。\n光は、高い目標が引き出す成長と、変容の美しさ。影は、変わることへの怖さと抵抗。\n紅葉は、木が枯れる前の最後の輝き。でも実は、次の春の準備でもある。"}, "229": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 19, "symbol": "耳にした会話をくり返すオウム", "description": "内側から浮かぶ言葉を、そのまま伝える力がある。\nそれが何を意味するか分からなくても、伝えることに意味がある。\n光は、内なるメッセージへの感受性と、それを言葉にする力。影は、意味を持たない反復に終わること。\nオウムの言葉は、言った本人が最も驚くことがある。"}, "230": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 20, "symbol": "二枚の暗いカーテンを引っ張る女性", "description": "見えない世界と見える世界を行き来できる能力を持つ。\n奥の神聖な道へ通じる扉を、自在に開閉する。\n光は、両世界を橋渡しする霊的な能力と、深みへのアクセス。影は、深く潜りすぎて戻れなくなること。\nカーテンの向こうを知る者は、こちら側の見え方が変わる。"}, "231": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 21, "symbol": "良心に従って命令に抵抗する軍人", "description": "どんな権威にも、良心の前では従えないものがある。\n信念は、階級や命令より深いところから来ている。\n光は、普遍的な正義への確信と、それを貫く精神的強さ。影は、孤立と、組織からの排除。\n良心は命令されなくても、知っている。"}, "232": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 22, "symbol": "野生の鴨を撃っているハンター", "description": "内側から変えられないなら、外に働きかけて変えようとする。\n説得は、時に弾丸よりも届かない。\n光は、改革への熱い意志と、諦めない粘り強さ。影は、強固な社会の前での限界と消耗。\n鴨は飛ぶことをやめない。だから撃たれる可能性がある。"}, "233": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 23, "symbol": "自然界の精霊に変容するウサギ", "description": "溜まった怒りや衝動を、芸術やアートの形に昇華させる。\n処理できない感情が、創造の素材になる。\n光は、影の力を美に変える錬金術的な能力。影は、変容できない感情が内側に滞ること。\nウサギが精霊になるとき、それは変容の儀式。"}, "234": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 24, "symbol": "帰路につく群衆", "description": "山の言葉を聴いた後、自分の影を受け容れて帰っていく。\n深い真実に触れた者は、日常が変わって見える。\n光は、内なる影の統合と、それを伝える力。影は、日常に戻ることへの抵抗感。\n帰り道は、行き道と同じ道でも、全く違って見える。"}, "235": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 25, "symbol": "Ｘ線写真", "description": "表面の下にある本当の姿を、見ずにはいられない。\nどんな物事も、裏側まで知りたいという衝動がある。\n光は、鋭い洞察力と、本質を暴き出す探究心。影は、知りすぎることへの重荷と孤独。\nレントゲンは、本人も知らなかった自分を見せることがある。"}, "236": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 26, "symbol": "アメリカン・インディアンたち", "description": "場所が変わっても、自分のやり方は変わらない。\n適応しながら、核心は守る生き方がある。\n光は、どこでも生き抜く適応力と、本来の価値観の堅守。影は、変化への過度な抵抗。\nインディアンはテントを移しても、空を見上げる。"}, "237": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 27, "symbol": "行進している軍楽隊", "description": "自分の信じるものを、力強く広めていく。\n確信が音楽になって、聞こえない場所にまで届く。\n光は、得た確信を伝道する熱意と、まわりを動かす影響力。影は、信条を押し付けることへの反感。\n軍楽隊の音楽は、聞きたくない者にも届く。"}, "238": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 28, "symbol": "領土に近づいている妖精たちの王", "description": "長く外に求めていたものが、内側に静かにあることを知る。\n精神の安住の地は、心の奥底に隠れていた。\n光は、内なる王国の発見と、深い精神的な安定。影は、たどり着くまでの長い孤独な道。\n妖精の王の領土は、地図には載っていない。"}, "239": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 29, "symbol": "インディアンの女性", "description": "深く関わりすぎた者と離れることの、苦しいほどの葛藤。\n愛情と依存の境界線が、見えなくなっている。\n光は、深い絆への誠実さと、本当に必要なものを守る愛。影は、関係性への執着が自由を奪うこと。\n呪縛は、愛情と区別がつかないことがある。"}, "240": {"sign_ja": "蠍座", "sign_en": "Scorpio", "degree": 30, "symbol": "ハロウィン衣装の子どもたち", "description": "影を仮装にして遊ぶことで、その恐怖が力に変わる。\n暗闇をユーモアで包むと、こちらが主役になる。\n光は、影への創造的なアプローチと、笑いがもたらす解放力。影は、軽くしすぎて本質を見失うこと。\n幽霊に扮した者は、もう幽霊を怖がれない。"}, "241": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 1, "symbol": "退役軍人たち", "description": "かつてのライバルが再び集まるとき、切磋琢磨の記憶が蘇る。\n大きな理想のために、また仲間として動き出す。\n光は、高い理想と、仲間と共に挑戦する情熱。影は、過去の栄光に縛られること。\n退役した者が再び集まるとき、錆びた剣に光が戻る。"}, "242": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 2, "symbol": "海の上に風の力を見せる白い帽子に覆われた波", "description": "人々の共鳴が大きな波になり、熱狂が熱狂を呼ぶ。\n一人では出せない熱量が、集まることで生まれる。\n光は、共鳴と波動による大きなエネルギーの創出。影は、興奮が制御不能になること。\n一つの波が砕けた後、さらに大きな波が来る。"}, "243": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 3, "symbol": "チェスをしているふたりの男", "description": "全体を見ながら、相手の次の手を読む。\n知略と戦略に喜びを感じる、頭脳の闘士。\n光は、全体俯瞰と瞬発的な判断力の鋭さ。影は、勝負に囚われて本質を見失うこと。\nチェスは、最初の一手で勝負が始まっている。"}, "244": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 4, "symbol": "歩くことを学んでいる小さな子ども", "description": "理想を語るだけでなく、初めての一歩を踏み出す。\n転んでも励まされて、また立つことを繰り返す。\n光は、実践への意欲と、具体的な行動に落とし込む力。影は、完璧な準備を待ちすぎて動けないこと。\n歩けるようになった子は、もう止まれない。"}, "245": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 5, "symbol": "大木の枝に独りで座る老いたフクロウ", "description": "知恵は、昼ではなく夜に光る。\n全体の裏の事情を、高いところから静かに把握している。\n光は、俯瞰的な知恵と、見えないものを見る力。影は、一人で知りすぎて孤立すること。\n老いたフクロウは、月を見て笑っているかもしれない。"}, "246": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 6, "symbol": "クリケットの試合", "description": "正々堂々と全力をぶつけ合うことに、真の喜びがある。\nルールの中でこそ、摩擦の火が強く燃える。\n光は、全力勝負の情熱と、切磋琢磨の喜び。影は、勝負への執着が協調を妨げること。\nクリケットのスコアより、試合が終わった後の握手が大事。"}, "247": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 7, "symbol": "人間のハートの扉をノックするキューピッド", "description": "予測外の一矢が、日常という鎧を貫く。\n安定した規律の中に穴を開けることで、精神が解放される。\n光は、予定不調和の喜びと、人のハートを開く鮮やかさ。影は、無責任なかき乱しが傷を残すこと。\nキューピッドは、誰も頼んでいないのに矢を放つ。"}, "248": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 8, "symbol": "新しい元素が形成されている地球の深部", "description": "常に別の自分になりたいという衝動が、地底で沸騰している。\n今と違う場所、違う自分への熱い焦燥感。\n光は、変化と成長への渇望と、新しい可能性を求めるエネルギー。影は、今ここにある自分を軽んじること。\n新しい元素は、過去の元素が溶けて融合したもの。"}, "249": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 9, "symbol": "階段で一段ずつ幼い子どもを導く母親", "description": "なぜ登るのかわからないまま、段を上っているかもしれない。\nそれでも、一段上がるたびに何かが変わる。\n光は、高みへの意識的な上昇と、導きを受け取る謙虚さ。影は、急ぎすぎて足元を見失うこと。\n階段の終わりは、登り始めた者にしか見えない。"}, "250": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 10, "symbol": "金髪の女神の演技が表現されるタイミング", "description": "誰もが夢見る成功の形が、突然目の前に現れる。\n華やかな瞬間は、準備された者のもとにやってくる。\n光は、カリスマ的な存在感と、幸運を引き寄せる輝き。影は、外見的な成功が内側の充実を保証しないこと。\n幸運の女神は、常に笑顔を向けてくれるとは限らない。"}, "251": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 11, "symbol": "人間の身体のような形状の燃えているランプ", "description": "修行によって、身体そのものが光を宿す。\n霊主体従ではなく、霊と体が一つになる境地をめざす。\n光は、精神と肉体の統合がもたらす解放と光明。影は、求道の厳しさが日常生活を蝕むこと。\nランプは、油があって、芯があって、火があって、初めて燃える。"}, "252": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 12, "symbol": "おんどりに変化する鷲", "description": "思いを行動に変え、その行動でまわりに夜明けを告げる。\n高く飛ぶ鷲が、地上に降りて声を上げる。\n光は、理想を行動に変換する力と、まわりへの啓発力。影は、思いが空回りして形にならないこと。\n夜明けを告げる声は、太陽が昇る前に鳴く。"}, "253": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 13, "symbol": "明るみに出る未亡人の過去", "description": "無意識に蓄えられていた情報が、あるとき意識に浮かぶ。\n知らなかった自分の感覚が、言語化される瞬間。\n光は、身体感覚の情報を読み解く直観力。影は、知りたくなかったことまで知ってしまうこと。\n秘密は、守られているうちは力を持つ。"}, "254": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 14, "symbol": "偉大なピラミッドとスフィンクス", "description": "人類が古代に持っていた叡智の謎に、魅了され続ける。\n宇宙と地球と人間のつながりを、解き明かしたい。\n光は、古代の謎への探究心と、宇宙的な視野の広さ。影は、謎に取りつかれて現在を生きられないこと。\nスフィンクスは、答えを知っていても、問いを立てる。"}, "255": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 15, "symbol": "自分の影を探しているグラウンド・ホッグ", "description": "理想が地上に着地する方法を、慎重に探している。\n影を見つけることで、実体がわかる。\n光は、高い学びを現実に落とし込む実践力。影は、影を見つけられずに宙ぶらりんのままになること。\n影が見えたとき、自分が光に向かっていることがわかる。"}, "256": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 16, "symbol": "食べ物を期待して船のまわりを飛ぶカモメ", "description": "高みの知識を、地上での暮らしに使いこなす訓練。\n空を飛ぶ感覚を持ちながら、地面を歩く術を身につける。\n光は、高い知性と地に足のついた実用性の統合。影は、地上の細かさに縛られて自由さを失うこと。\nカモメは海でも空でも生きている。"}, "257": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 17, "symbol": "復活祭の日の出の礼拝", "description": "たましいの情熱を、みんなで分かち合う喜び。\n個人の目覚めが、集合的な希望になる瞬間。\n光は、人類の可能性への信頼と、集団を高める情熱。影は、信念の押し付けが反感を生むこと。\n復活は、一人で起きるのではなく、見届ける者がいて完成する。"}, "258": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 18, "symbol": "ビーチで遊んでいる子どもたち", "description": "太陽の力を、帽子で適度に和らげながら楽しむ。\n情熱は大切にしながら、燃えすぎないバランスを保つ。\n光は、火のエネルギーを適切に扱う成熟と、喜びを日常に織り込む力。影は、情熱が暴走すること。\n帽子は太陽を遮るが、同時に日差しの中に立てる。"}, "259": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 19, "symbol": "子どもたちを連れて引っ越すペリカン", "description": "次の世代の可能性のために、より良い環境を選ぶ。\n自分が得た知恵を育む場所に移ることで、精神が開花する。\n光は、理想の環境への行動力と、深い愛情の実践。影は、理想の場所が見つからない焦り。\nペリカンの親は、子のために自分の胸を傷つけると言われる。"}, "260": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 20, "symbol": "凍った池から切り出している男たち", "description": "伝統的な技術を、今必要とされている場所に届ける。\nすでに持っているものを、必要な形で生かす知恵。\n光は、専門的な知識の柔軟な活用と、協力して目的を達成する力。影は、固定した技術が新しい状況に対応できないこと。\n氷は切り出すことで、熱い夏にも届く。"}, "261": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 21, "symbol": "借りたメガネをかけている子どもと犬", "description": "自然体を超えた高い目標に、あえて挑む。\n身の丈を超えることで、新しい視点が開かれる。\n光は、挑戦への意欲と、成長のための無謀な勇気。影は、無理が重なって本来の自分を見失うこと。\n借りたメガネは、やがて自分のものになることがある。"}, "262": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 22, "symbol": "中国人の洗濯物", "description": "どこへ行っても、自分のリズムと文化を持ち込む。\n環境に馴染みながら、自分であることを失わない。\n光は、環境を超えた自己保持と、どこでも自分らしくいられる安心感。影は、地域への適応を怠ること。\n自分の言語で夢を見る者は、どこでも故郷を持っている。"}, "263": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 23, "symbol": "移民グループの求めに応じる新しい国の入り口", "description": "どこへ行ってもありのままの自分でいることが、最大の強み。\n自分を否定しないまま、世界にフィットする。\n光は、高い適応力と、自己を保持したままどこでも生きる力。影は、自己保持が頑固さになること。\n移民は、荷物の中に故郷を持って新しい国に入る。"}, "264": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 24, "symbol": "コテージの入り口に止まっている青い鳥", "description": "しっかりとした知識体系があるから、さらなる進化を歓迎できる。\n安心の基盤があってこそ、開かれていられる。\n光は、積み上げた知識の安定と、進化し続ける柔軟性。影は、変化を受け入れず固定化すること。\n青い鳥は、幸せが遠くではなく、家の入り口にいることを知っている。"}, "265": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 25, "symbol": "玩具の馬上にいる小太りの少年", "description": "机上で夢を大きく膨らませ、可能性を丁寧に練り上げる。\n知識が豊富だからこそ、実践前の構想が深い。\n光は、豊かな想像力と、多彩な視点から練られた計画力。影は、シミュレーションが行動より多くなること。\n玩具の馬は、乗り手の夢を知っている。"}, "266": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 26, "symbol": "戦いにおける旗手", "description": "最前線で信念を掲げ、仲間の士気を高める。\n自分が熱くあることで、まわりに火を点ける。\n光は、信念の旗手としての熱意と、仲間を鼓舞する力。影は、旗を持ちすぎて、自分が燃え尽きること。\n旗手が倒れても、旗は次の者が拾う。"}, "267": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 27, "symbol": "仕事している彫刻家", "description": "理想を分かりやすい形に彫り出し、みんなと共有する。\n内側にある像が、手の技術によって現れてくる。\n光は、理想を具体化する創造力と、それを広める使命感。影は、完璧な形を求めすぎて完成しないこと。\n彫刻家は、石の中にすでにある形を取り出すと言った。"}, "268": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 28, "symbol": "美しい流れの上にかけられた古い橋", "description": "みんなが使い慣れた形の中に、新しい思想を盛り込む。\n既存のものを否定せずに、その中に変革の種を植える。\n光は、馴染みのある形を通して普及する戦略的な知恵。影は、古い形に縛られて革新を半減させること。\n橋は、何百年も流れを越えさせてきた。"}, "269": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 29, "symbol": "エレガントな郊外の家の芝を刈る太った少年", "description": "積み重ねた知識を刈り込んで、使える形にする。\n山羊座への準備として、余分を削ぎ落とす段階。\n光は、学びを実用に落とし込む潔さと、地に足をつける意志。影は、知識を手放すことへの執着。\n芝は刈られることで、美しくなる。"}, "270": {"sign_ja": "射手座", "sign_en": "Sagittarius", "degree": 30, "symbol": "支持者を祝福する法王", "description": "学び続けた末に、一つの体系をまとめ上げて伝える立場になる。\nすべての探求が、一つの集大成として結実する。\n光は、思想の体系化と、それを広める権威と使命。影は、固定化によって新しい探求が止まること。\n法王も、かつては迷える学徒だった。"}, "271": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 1, "symbol": "力を認識させるインディアンの酋長", "description": "社会に向かって、自分の立場と力を堂々と主張する。\n集団の中で自分らしさを打ち出す情熱が、この度数に満ちている。\n光は、社会を動かすカリスマ性と力強い行動力。影は、幼児的な支配欲求が権力と結びつくこと。\n酋長の権威は、命令より、その存在から来る。"}, "272": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 2, "symbol": "ゴシック教会の三つのバラの窓", "description": "傷ついたバラ窓が、神聖な光を通すことをやめない。\n理想を実現する過程で傷ついても、それが人を深くする。\n光は、傷を超えて理想を実現する強さ。影は、傷に囚われて前に進めないこと。\nひびの入ったステンドグラスは、光が当たると違う色を見せる。"}, "273": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 3, "symbol": "現実を創り出していく人間の魂", "description": "内側の理想を、現実という形に降ろしていく意志。\n見えないものを見える形にすることへの、熱い渇望。\n光は、理想を現実にする行動力と、新しい可能性への絶え間ない探求。影は、形にならない焦りと消耗。\n魂は、形をとって初めて自分を知る。"}, "274": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 4, "symbol": "大きなカヌーを整える一行", "description": "目的に向かって、仲間と役割を分かち合いながら準備する。\n念入りな準備が、困難な旅を可能にする。\n光は、協力から生まれる強固な目標達成力。影は、準備が長くなりすぎて出発できないこと。\nカヌーが整う音は、旅の始まりの音。"}, "275": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 5, "symbol": "インディアンの出征の道", "description": "カヌーを漕ぐ者と、踊る者が、同じ目的に向かう。\n異なる役割が一つの大きな流れを作る。\n光は、集団として挑む一体感と、ライバルとの切磋琢磨。影は、勝利至上主義が手段を選ばなくなること。\n出征の踊りは、戦う前に戦いを終わらせることがある。"}, "276": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 6, "symbol": "アーチの下に敷かれた10本の丸太", "description": "共通の恐れを認識することで、人々の結束が生まれる。\n社会の暗部に向き合いながら、集団を支える力を持つ。\n光は、組織を強固にまとめる力と、問題に正面から向き合う責任感。影は、恐れを煽ることで結束を偽ること。\n暗い森があるからこそ、アーチの灯りが意味を持つ。"}, "277": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 7, "symbol": "神の力を宿して語るヴェールをかぶった予言者", "description": "土地と人々の集合的な意志を、言葉として伝える媒介になる。\n地霊の声が、この人を通して語られる。\n光は、土地とのつながりと、人々の心を動かす言葉の力。影は、神の代弁者として権力を振るうこと。\nヴェールは、見えすぎないための保護。"}, "278": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 8, "symbol": "陽のあたる家で飼われている喜びを歌う鳥たち", "description": "与えられた環境に自分を合わせることで、幸せを見つける。\nないものを嘆かず、あるものに満足する術を持つ。\n光は、どこでも幸せを見出す柔軟な適応力。影は、より大きな可能性を見失うこと。\nカゴの中の鳥が歌うとき、カゴは歌のための場所になる。"}, "279": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 9, "symbol": "ハープを運んでいる天使", "description": "大きな流れに守られて、自然と調和して生きる。\n無理をしなくても、宇宙の音楽が奏でられる。\n光は、天と地のつながりへの信頼と、自然なめぐりに沿う知恵。影は、力を抜きすぎて受け身になること。\nハープは弦を張ることで、音が鳴る。"}, "280": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 10, "symbol": "手から餌をもらっているアホウドリ", "description": "今ここにないものを求めて、警戒心を超えて飛び込む。\n新しい要素を外から持ち込むことで、組織が活性化する。\n光は、冒険的な好奇心と、組織に新陳代謝をもたらす勇気。影は、無防備な突進が招く危険。\nアホウドリは警戒心が薄いから、近づきすぎる。"}, "281": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 11, "symbol": "個人所有の土地の中のキジの大群", "description": "選ばれた者が集まることで、高度な専門性が生まれる。\nクローズドな環境で、特定の能力が飛躍的に伸びる。\n光は、専門的な集団の中で磨かれる卓越した技術。影は、閉鎖的なエリート意識が外を排除すること。\nキジは群れの中でしか出せない美しさがある。"}, "282": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 12, "symbol": "図解された自然科学の講義", "description": "一つのテーマを徹底的に掘り下げることで、新しい世界が開ける。\n専門家同士が集まると、個人では辿り着けない境地に達する。\n光は、集中した探求から生まれる画期的な発見。影は、専門性が深まるほど、一般には通じなくなること。\n図解は、言葉より先に理解を運ぶ。"}, "283": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 13, "symbol": "究極の存在の真実と共にある火の崇拝者の瞑想", "description": "内なる火を絶やさないことが、集団の士気を保つ。\nどんな状況でも、自分の中の炎だけは守り続ける。\n光は、精神と意志の力が尽きない燃え続ける命の炎。影は、内なる火が消えたとき、すべてが冷えること。\n瞑想の中で燃える火は、目に見えない。"}, "284": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 14, "symbol": "御影石に彫られた古代の彫刻", "description": "自分の発見は、すでに誰かが辿り着いていたかもしれない。\nそれでも、確認するという行為が今の自分を確信に変える。\n光は、人類の普遍性への理解と、来歴から得る確信。影は、先人の発見への落胆が探求心を萎ませること。\n古代の彫刻は、今も語りかけてくる。"}, "285": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 15, "symbol": "おもちゃでいっぱいの病院の小児病棟", "description": "子どもの感性を解放することが、土台そのものを変える。\n心を開かせることで、人間の本来の可能性が目覚める。\n光は、感情の解放がもたらす可能性の開花と、教育への深い洞察。影は、子ども心を引き出すことの難しさと挫折。\nおもちゃは、傷を忘れさせるためではなく、思い出すために並んでいる。"}, "286": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 16, "symbol": "体操着の少年少女であふれる校庭", "description": "感情を解放することが、より強い社会的な自分を作る。\n内なる子どものような感受性を受け入れることで、全体がバランスする。\n光は、感情と社会性の統合がもたらす強さ。影は、感情を解放しすぎて律する力を失うこと。\n体操着は、全員が同じ動きを共に行うための服。"}, "287": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 17, "symbol": "抑圧された女性", "description": "抑えてきた身体の感覚を解放することで、本来の自分が戻る。\n「こうあるべき」の型から身体を解き放つ。\n光は、心身の自由と、全体性の回復がもたらす力。影は、解放が行きすぎて秩序が失われること。\n脱いだ服は、もう一度着るために脱いだ。"}, "288": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 18, "symbol": "イギリス艦隊のユニオンジャック", "description": "感情の波を受け身ではなく、能動的に乗りこなす。\n大海原に自ら漕ぎ出すことで、感情が力に変わる。\n光は、感情を管理し、能動的に活用するしなやかな強さ。影は、コントロールが感情の自然な流れを妨げること。\nジャックは風に揺れながら、前進する船を示す。"}, "289": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 19, "symbol": "バッグを運んでいる五歳の子ども", "description": "自分より大きな役割を引き受けることで、責任が成長させる。\n他者への貢献を通じて、自分の器が広がる。\n光は、社会への貢献意識と、責任を引き受ける成熟。影は、責任が重すぎて倒れること。\n大きなバッグを持てた子は、何かを確かめた顔をしている。"}, "290": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 20, "symbol": "祭祀のあいだ歌い続けている隠れた聖歌隊", "description": "表に出ずとも、全体を下から支える存在がある。\n名前のない貢献が、儀式の神聖さを守っている。\n光は、黒子に徹する謙虚さと、全体への深い貢献意識。影は、自分の存在が認められないことへの虚しさ。\n見えない声が、場を聖なるものにしている。"}, "291": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 21, "symbol": "リレー競争", "description": "最高のチームの中で、自分の最善を出す。\n個人の力が集まることで、誰かひとりでは届かないタイムが生まれる。\n光は、競争がもたらす実力の引き上げと、チームへの貢献。影は、勝敗に執着するあまり本来の目的を忘れること。\nバトンは、渡した後も、受け取った者の中に生きる。"}, "292": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 22, "symbol": "明らかになった将軍の高貴な性格", "description": "数字上の勝敗より、本質的なものを守ることを選ぶ。\n潔い敗北が、もっと大切なものを守ることがある。\n光は、本質への眼と、高潔な判断が生む長期的な勝利。影は、短期の数字に囚われて本質を見失うこと。\n優雅に負ける者は、本当は勝ち方を知っている。"}, "293": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 23, "symbol": "２つの賞を受け取った戦士", "description": "社会的な功績と、個人的な精神的充足の両方を得る。\n外の成功が内の満足を妨げないとき、本当の力が発揮される。\n光は、社会貢献と個人の充足を両立させる知恵。影は、どちらか一方に傾きすぎること。\n二つの賞は、二つの問いへの答え。"}, "294": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 24, "symbol": "修道院に入る女", "description": "精神の源流に触れることで、社会への貢献力が深まる。\n祈りは引退ではなく、再充填。\n光は、精神的な力とつながって働く、内外統合の力。影は、精神世界に閉じこもって現実を手放すこと。\n修道院の壁は、外を遮断するためではなく、内を守るためにある。"}, "295": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 25, "symbol": "貴重な東洋の敷物でいっぱいの店", "description": "ローカルの発展のために、異文化の価値を持ち込む。\n外の世界が持っているものを、内側に招き入れる。\n光は、異文化との交流がもたらす新しい価値の創造。影は、自文化が薄まること。\n東の敷物が西の床の上に広がるとき、二つの文化が対話している。"}, "296": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 26, "symbol": "滝の虹色の霧の中で踊っている水の精霊", "description": "言葉を超えた魅力で、人々の心を惹きつける。\n感覚と感情に直接訴える、アートのような存在感。\n光は、万人を惹きつける独特の感受性と、土地の魅力を世界へ届ける力。影は、感情的な訴えが一時的な熱に終わること。\n虹色の霧の中で踊る精霊は、見た者の中に残る。"}, "297": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 27, "symbol": "急な階段を登っている巡礼者", "description": "自分の力だけを頼りに、険しい道を一歩ずつ登る。\n鉛を金に変えるような、たゆまぬ内的鍛錬がテーマ。\n光は、信念と忍耐による自己錬成と、たどり着いた者だけが見る景色。影は、あまりの険しさに道半ばで倒れること。\n急な階段を登れる者は、登り方より信念を持っている。"}, "298": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 28, "symbol": "大きな養鶏場", "description": "システムをやりきることで、次の地平が見えてくる。\n役割を全うした後にのみ、本当の選択肢が現れる。\n光は、能力を使い切った先に開ける新しい視野。影は、仕組みに閉じ込められたまま自由を失うこと。\n鶏は夜明けを知っている。だから朝に鳴く。"}, "299": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 29, "symbol": "お茶の葉を読んでいる女", "description": "法則を知り尽くした者は、偶然の形から未来を読む。\n客観的な視点が、世界の次の動きを予見する。\n光は、社会の法則を俯瞰する知性と、未来を予測する洞察力。影は、予測に過信して変化への適応が遅れること。\nお茶の葉は読んだ者によって、毎回違うことを語る。"}, "300": {"sign_ja": "山羊座", "sign_en": "Capricorn", "degree": 30, "symbol": "最高決断をくだす責任者たちの秘密会議", "description": "頂点に立ったとき、始めて見える世界の全貌がある。\nそして、理想の改革がいかに難しいかも同時に知る。\n光は、社会全体を見渡す視野と、次の時代へのビジョン。影は、理解されない孤独と、変革が届かない焦り。\n最高の会議室は、外から見えない場所にある。"}, "301": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 1, "symbol": "カリフォルニアの古いレンガ造りの伝導所", "description": "時代を超えた価値を実践することで、世代を超えた意味が生まれる。\n流行の中にいながら、変わらないものを守り続ける。\n光は、普遍的な真実への探求と、それを実践に落とし込む意志。影は、時代から孤立した守旧主義。\n古いレンガ造りは、最先端の街の中でも揺るがない。"}, "302": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 2, "symbol": "予期されなかった雷雨", "description": "依存していたものが壊れる瞬間に、真の自由が始まる。\nシステムが崩れることで、内側の声が聴こえるようになる。\n光は、外の崩壊が呼び覚ます内なる真実への目覚め。影は、崩壊に対処できず混乱に陥ること。\n雷雨は、乾ききった土地を潤すために来る。"}, "303": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 3, "symbol": "海軍からの脱走兵", "description": "規律への反発が、真の自由への第一歩になる。\n誰からも支配されないことへの、譲れない意志。\n光は、内なる自由への強固な意志と、独立した自己の確立。影は、孤立と社会との摩擦。\n脱走は終わりではなく、別の忠誠の始まり。"}, "304": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 4, "symbol": "ヒンズー教徒のヨガ行者", "description": "社会のシステムに依存せず、スキルで独立して生きる。\n同じ志の者たちとつながりながら、自立した道を歩む。\n光は、精神的なスキルによる独立と、横のつながりが生む自由。影は、社会との接続を失い孤立すること。\nヨガ行者の力は、誰かから与えられたのではない。"}, "305": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 5, "symbol": "先祖の協議会", "description": "見えないところで、多くの力が若いリーダーを支えている。\n偶然の出会いや巡り合わせが、実は必然だったとわかる。\n光は、見えない援助に気づく感謝と、多くの力を借りた謙虚さ。影は、自分の力だけで生きているという誤解。\n協議会は、見えないところで常に開かれている。"}, "306": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 6, "symbol": "ミステリー劇で儀式に興じる仮面をつけた演者", "description": "役を演じることで、本体の自由を守る。\n求められる役割と、本当の自分の間に、確かな距離を保つ。\n光は、役割と自己を切り離す知性と、どこにいても自由でいられる強さ。影は、役を演じすぎて本体を忘れること。\n仮面は外すと、素顔が一番輝く。"}, "307": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 7, "symbol": "卵から生まれたと見られる子ども", "description": "誰のものでもない存在として、どこにでも馴染む。\n愛着を持ちすぎないことが、真のオープンさを生む。\n光は、どこへでも自然に入り込める透明な存在感。影は、深いつながりを持てない孤独。\n卵から生まれた子には、持ち物がない。"}, "308": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 8, "symbol": "飾られている美しい衣装を着た蝋人形", "description": "感情的距離を保ちながら、世界を実験の場として観察する。\n機械的な反応は、自分を守りながら自由でいるための選択。\n光は、客観的な眼と、感情に流されない冷静な探求力。影は、生きた感情を遠ざけすぎること。\n蝋人形は完璧だが、温かくない。"}, "309": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 9, "symbol": "鷲に変身する旗", "description": "決めた目的を、ドローンのように迷わず実行する。\n理由に基づいた行動が、人生の全部を貫いている。\n光は、一貫した信念と、計画を忠実に実行する力。影は、融通が利かないほど頑固になること。\n旗が鷲になるとき、思想が羽ばたく。"}, "310": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 10, "symbol": "実現するために作られた男", "description": "社会の期待に応えることが、本当の自分かわからなくなる。\nいつも、どこか醒めた目で自分の役割を眺めている。\n光は、役割を超えた本来の自己への洞察。影は、ど こにも完全には属せない浮遊感。\nまっさらな自分に戻るとき、その人は最も自由。"}, "311": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 11, "symbol": "新しいひらめきを受け取った男性", "description": "沈黙の中から、思考を超えた純粋な真実が浮かぶ。\n外からのすべてを止めたとき、内からのものが聴こえる。\n光は、深い沈黙から生まれる真のひらめき。影は、沈黙に耐えられず外からの刺激を求めること。\nひらめきは、準備ができた沈黙の中に降りてくる。"}, "312": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 12, "symbol": "さまざまなタイプの人々", "description": "意識が高まるほど、解脱に近づいていく。\n自分で考え、自分で行動することが「より意識的」の定義。\n光は、自己覚醒への強い求道心と、意識の進化への意志。影は、他者を「眠っている」と見下すこと。\n卒業とは、誰かに与えられるものではなく、気づくこと。"}, "313": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 13, "symbol": "バロメーター", "description": "すべてに等距離を保つことで、全体の流れが見える。\n偏らないからこそ、変化の予兆が測れる。\n光は、公平な観察眼と、世の中の動きを冷静に読む能力。影は、冷静すぎて感情的なつながりを持てないこと。\nバロメーターは、嵐の前から揺れ始める。"}, "314": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 14, "symbol": "トンネルに突入している電車", "description": "古いやり方を一気にワープして、新しい時代へ突入する。\n超合理性が、人間の時間と労力を解放する。\n光は、システムの革新と、人間らしさを守るための合理化。影は、合理化が人間の温かさを奪うこと。\nトンネルは暗いが、出口は必ずある。"}, "315": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 15, "symbol": "幸せそうに歌っている二羽のラブバード", "description": "内の男性性と女性性のバランスが整ったとき、世界が歌って見える。\n余裕を持って眺めるから、全体の流れが掴める。\n光は、内的調和から生まれる軽やかな全体把握力。影は、傍観者に留まりすぎること。\nフェンスの上から見る風景は、どちらの側も美しい。"}, "316": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 16, "symbol": "デスクに座る偉大なビジネスマン", "description": "信念をビジョンとして形にし、それを社会に示す。\nお金のためではなく、価値観のために動くビジネス。\n光は、信念に基づく壮大な理想の実現力。影は、信念が独善的になって他者を排除すること。\nビジネスは、一番深い動機を現実に変える装置。"}, "317": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 17, "symbol": "主人と所有物を監視している番犬", "description": "曖昧になった境界に、明確な線を引く。\nどこまでが誰のものか、はっきりさせることで全体が機能する。\n光は、境界を守る明確さと、それが生む安全な協力関係。影は、境界が壁になって柔軟性を失うこと。\n番犬は、守るものがあるから吠える。"}, "318": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 18, "symbol": "秘密の動機が公に暴露されていく男", "description": "隠されていた真実が、光の中に引き出される。\n嘘は嗅ぎ取られ、公明正大さが求められる時代。\n光は、真実への誠実さと、隠蔽を許さない公正さ。影は、暴露がプライバシーを侵害すること。\n秘密は、知られることを怖れているうちは力を持つ。"}, "319": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 19, "symbol": "筋力のある人たちの活躍で収められた山火事", "description": "マニュアルなき状況でも、意識が開いているから対処できる。\n問題が起きた瞬間に、今できることで動く。\n光は、常にオープンな意識と、状況に応じた柔軟な対応力。影は、理論が先行して行動が遅れること。\n山火事に、マニュアルはない。"}, "320": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 20, "symbol": "メッセージを運ぶ大きな白い鳩", "description": "世界はすでに万全で、必要なメッセージが届くようになっている。\n外に開いていながら、中心からブレない。\n光は、共時性への信頼と、世界とシンクロして生きる感覚。影は、メッセージの意味を読み誤ること。\n白い鳩は、希望を運ぶために嵐の後に現れる。"}, "321": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 21, "symbol": "虚しい人生を眺めている女性", "description": "本能や感情を超えた大きな目的のために、自分を捧げる。\n個人の幸せより、世界の幸せを選ぶことがある。\n光は、使命への献身と、それを支える精神的な強靭さ。影は、個人の喜びを失うことへの虚しさ。\n虚しさを知っている人は、その先の豊かさも知っている。"}, "322": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 22, "symbol": "育児室の床に敷かれた布", "description": "かつて抑えた心身の感覚を、もう一度開放していく。\n幼少期からやり直すような再教育で、本来の自分を取り戻す。\n光は、身体と感情の再解放がもたらす自由と全体性。影は、再教育が苦しいほどの長い道のり。\n床に敷かれた布は、どんな子どもも受け止める。"}, "323": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 23, "symbol": "大きなクマ", "description": "理性の力で、本能と感情を隅々まで矯正していく。\n動物的な部分を意識でコントロールしようとする挑戦。\n光は、意志の力による自己制御と、それが生む深い自由。影は、制御しすぎて生命力が失われること。\nクマは手足を振るが、それは意図した動きかもしれない。"}, "324": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 24, "symbol": "自分の経験に基づく深い知恵を教える男", "description": "情熱ではなく、経験に裏打ちされた冷静な知恵を語る。\n感情を制御することで、言葉がより遠くまで届く。\n光は、実践から生まれた生きた知恵と、それを語る冷静な洞察力。影は、冷静すぎて情熱を失うこと。\n経験は、体験した者の言葉にしか宿らない。"}, "325": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 25, "symbol": "右の羽がより完全に形成されている蝶", "description": "理性と信念が隅々まで浸透したとき、この人の個性が完成する。\n外に依存せず、内側から輝く自立した存在になる。\n光は、理性的な自立と、知性が全体に行き渡る完成の感覚。影は、左側の感性が置き去りにされること。\n右の羽が強いとき、左の羽への問いが始まる。"}, "326": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 26, "symbol": "車のバッテリーを検査している自動車修理工", "description": "常日頃から細かく点検することで、問題を防ぐ。\n心の繊細な揺れ動きも、技術的に理解して扱う。\n光は、慎重な管理力と、高い専門性で人の心に働きかける力。影は、過剰な管理が自発性を奪うこと。\nバッテリーは、使われる前に確認される。"}, "327": {"sign_ja": "水瓶座", "sign_en": "Aquarius", "degree": 27, "symbol": "新鮮なスミレで満たされた古代の陶器", "description": "個人の感情より、普遍的な価値の中に自分を見出す。\n一時的な気持 // ── ASTRONOMY ──
function getEclipticLon(planet, astroTime){
  const AE=Astronomy;
  if(planet==='Sun'){
    const e=AE.SunPosition(astroTime).elon;
    return((e%360)+360)%360;
  }
  if(planet==='Moon'){
    const m=AE.EclipticGeoMoon(astroTime);
    return((m.lon%360)+360)%360;
  }
  if(planet==='Earth'){
    const s=AE.SunPosition(astroTime).elon;
    return((s+180)%360+360)%360;
  }
  const body=AE.Body[planet];
  const vec=AE.GeoVector(body,astroTime,true);
  const ecl=AE.Ecliptic(vec);
  return((ecl.elon%360)+360)%360;
}

function lonToData(lon){
  const idx=Math.floor(lon/30);
  const inSign=lon%30;
  const sabDeg=Math.ceil(inSign)||1;
  const absIdx=Math.min(idx*30+sabDeg,360);
  return{
    signJa:SIGNS_JA[idx],signSym:SIGN_SYM[idx],
    degInSign:inSign,sabDeg,absIdx,lon,
    degStr:Math.floor(inSign)+'°'+String(Math.round((inSign%1)*60)).padStart(2,'0')+"'"
  };
}

  const d=await res.json();
  if(!d.length)throw new Error('場所が見つかりません: '+loc);
  return{lat:+d[0].lat,lon:+d[0].lon,display:d[0].display_name};
}

// ── MAIN ──
let currentData=[];

async function calculate(){
  const dateVal=document.getElementById('bdate').value;
  const timeVal=document.getElementById('btime').value||'12:00';
  const locVal=document.getElementById('bloc').value||'Tokyo';
  const msg=document.getElementById('msg');
  const btn=document.getElementById('calcBtn');
  if(!dateVal){msg.innerHTML='<div class="error">生年月日を入力してください</div>';return;}
  btn.disabled=true;
  msg.innerHTML='<div class="loading">✦ 天球を読み解いています... ✦</div>';
  try{
    // Geocode
    let geoInfo={lat:35.68,lon:139.69,display:locVal};
    try{geoInfo=await geocode(locVal);}catch(e){}
    
    // Build UTC date (rough tz from longitude)
    const[y,mo,d]=dateVal.split('-').map(Number);
    const[h,mi]=timeVal.split(':').map(Number);
    const tzOff=Math.round(geoInfo.lon/15);
    const utcDate=new Date(Date.UTC(y,mo-1,d,h-tzOff,mi));
    const at=Astronomy.MakeTime(utcDate);
    
    // Calculate all sephiroth
    currentData=SEPH.map(s=>{
      let lon=0;
      try{lon=getEclipticLon(s.planet,at);}catch(e){console.warn(s.planet,e);}
      const ld=lonToData(lon);
      const sab=SABIAN[String(ld.absIdx)]||SABIAN['1'];
      return{...s,...ld,sabian:sab};
    });
    
    renderCards(currentData,geoInfo,dateVal,timeVal);
    renderTree(currentData);
    document.getElementById('mainContent').style.display='grid';
    msg.innerHTML='';
    document.getElementById('mainContent').scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){
    msg.innerHTML='<div class="error">エラー: '+(e.message||e)+'</div>';
    console.error(e);
  }
  btn.disabled=false;
}

// ── RENDER CARDS ──
function renderCards(data,geo,dateStr,timeStr){
  const locShort=(geo.display||'').split(',')[0];
  let html=`<div class="birth-info">🗓 ${dateStr} &nbsp;⏰ ${timeStr} &nbsp;📍 ${locShort}</div>`;
  data.forEach((p,i)=>{
    const sab=p.sabian||{};
    html+=`
    <div class="planet-card" id="card${i}" onclick="toggleCard(${i})">
      <div class="planet-header">
        <span class="planet-icon" style="color:${p.color}">${p.icon}</span>
        <div>
          <div class="planet-name">${p.name}<span style="font-size:.7rem;color:#8a7060;font-weight:normal;margin-left:8px">${p.en}</span></div>
          <div class="planet-sub">${p.ja}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div class="zodiac-info">${p.signSym} ${p.signJa} ${p.sabDeg}度</div>
          <div style="font-size:.72rem;color:#8a7060">${p.degStr}</div>
        </div>
      </div>
      <div style="font-size:.8rem;color:#c8b080;letter-spacing:.08em;margin-bottom:8px;font-style:italic">${p.quality||''}</div>
      <div class="sabian-symbol">✦ ${sab.symbol||sab.s||''}</div>
      <div class="sabian-desc">${(sab.description||sab.d||'').split('\n').map(l=>`<p style="margin-bottom:6px">${l}</p>`).join('')}</div>
    </div>`;
  });
  document.getElementById('resultCards').innerHTML=html;
}

function toggleCard(i){
  const c=document.getElementById('card'+i);
  c.classList.toggle('active');
  highlightSeph(i);
}

// ── RENDER TREE ──
function renderTree(data){
  const svg=document.getElementById('tree');
  
  // Draw paths
  let s='<defs><radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a1035" stop-opacity=".5"/><stop offset="100%" stop-color="#080818" stop-opacity=".95"/></radialGradient></defs>';
  s+='<rect width="340" height="560" fill="url(#bg)" rx="10"/>';

  PATHS.forEach(([a,b])=>{
    const sa=SEPH[a],sb=SEPH[b];
    const isDaath=(a===3||b===3);
    s+=`<line x1="${sa.x}" y1="${sa.y}" x2="${sb.x}" y2="${sb.y}" stroke="${isDaath?'#44405a':'#3a2d55'}" stroke-width="${isDaath?1:1.4}" opacity="${isDaath?.35:.8}"/>`;
  });

  // Draw nodes
  data.forEach((p,i)=>{
    const r=p.hidden?18:24;
    const op=p.hidden?.6:1;
    s+=`
    <g id="seph${i}" onclick="toggleCard(${i})" style="cursor:pointer" opacity="${op}">
      <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="rgba(8,4,24,.92)"
        stroke="${p.color}" stroke-width="1.8" id="sc${i}" style="transition:filter .2s"/>
      <text x="${p.x}" y="${p.y-10}" font-size="7.5" fill="${p.color}" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-weight="bold">${p.name}</text>
      <text x="${p.x}" y="${p.y+2}" font-size="13" fill="${p.color}" text-anchor="middle" font-family="serif" opacity=".9">${p.icon}</text>
      <text x="${p.x}" y="${p.y+14}" font-size="7" fill="#d4c090" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho',serif">${p.signSym} ${p.signJa}</text>
      <text x="${p.x}" y="${p.y+23}" font-size="6.5" fill="#b0a080" text-anchor="middle" font-family="serif">${p.sabDeg}度</text>
    </g>`;
  });
  
  svg.innerHTML=s;
}

function highlightSeph(i){
  SEPH.forEach((_,j)=>{
    const c=document.getElementById('sc'+j);
    if(c){
      c.setAttribute('stroke-width',j===i?3.5:1.8);
      c.style.filter=j===i?`drop-shadow(0 0 6px ${SEPH[j].color})`:'';
    }
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement.tagName==='INPUT')calculate();
});
</script>
